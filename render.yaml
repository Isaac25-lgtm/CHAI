databases:
  - name: chai-pmtct-db
    plan: free
    databaseName: chai_pmtct
    user: chai_user

services:
  - type: web
    name: chai-pmtct
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build:render && node scripts/copy-standalone-assets.js
    startCommand: node .next/standalone/server.js
    healthCheckPath: /auth/login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chai-pmtct-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: HOSTNAME
        value: "0.0.0.0"

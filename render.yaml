databases:
  - name: chai-pmtct-db
    plan: free
    databaseName: chai_pmtct
    user: chai_user

services:
  - type: web
    name: chai-pmtct
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chai-pmtct-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NODE_ENV
        value: production
